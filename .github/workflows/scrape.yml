name: Scrape Lotto Data

on:
  schedule:
    # รันทุกชั่วโมง 15:00-18:00 น. (UTC+7 = 08:00-11:00 UTC)
    # ครอบคลุมวันที่ 1,2,3 และ 16,17,18 ของทุกเดือน
    # เผื่อผลหวยออกช้า หรือวันที่เลื่อนจากปกติ
    - cron: '0 8 1-3,16-18 * *'   # 15:00
    - cron: '0 9 1-3,16-18 * *'   # 16:00
    - cron: '0 10 1-3,16-18 * *'  # 17:00
    - cron: '0 11 1-3,16-18 * *'  # 18:00
  workflow_dispatch: # รันด้วยตัวเองได้จาก Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: python scripts/scrape.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update lotto data $(date +'%d/%m/%Y %H:%M')"
          git push